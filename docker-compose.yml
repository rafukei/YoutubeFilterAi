version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ytfilter
      POSTGRES_PASSWORD: ytfilter
      POSTGRES_DB: ytfilter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytfilter"]
      interval: 5s
      retries: 5
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Backend (FastAPI) ─────────────────────────────────
  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # live reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Frontend (React / Vite) ──────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_OPTIONS=--max-old-space-size=256
    # Vite dev server is memory-intensive; bind-mount overwrites source,
      # so we run the pre-built static files via nginx instead when in prod.
      # For dev, increase memory tolerance.
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512m

  # ── NGINX reverse proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  pgdata:
